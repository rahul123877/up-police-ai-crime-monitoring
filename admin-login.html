<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>UP Police Admin Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins, sans-serif;
        }

        body {

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            background: linear-gradient(135deg, #001b44, #002b6d, #003d99);

        }

        .login-box {

            width: 420px;

            background: white;

            padding: 40px;

            border-radius: 15px;

            box-shadow: 0 15px 40px rgba(0, 0, 0, .3);

        }

        .logo {

            text-align: center;

            font-size: 70px;

            margin-bottom: 10px;

        }

        h2 {

            text-align: center;

            color: #003366;

            margin-bottom: 25px;

        }

        input {

            width: 100%;

            padding: 15px;

            margin-top: 15px;

            border-radius: 8px;

            border: 1px solid #ccc;

            font-size: 16px;

            outline: none;

        }

        input:focus {

            border: 2px solid #0047AB;

        }

        button {

            width: 100%;

            padding: 15px;

            margin-top: 25px;

            background: #003366;

            color: white;

            font-size: 18px;

            border: none;

            border-radius: 8px;

            cursor: pointer;

            transition: .3s;

        }

        button:hover {

            background: #0057d8;

        }

        #error {

            margin-top: 15px;

            text-align: center;

            color: red;

            font-weight: bold;

        }

        .loader {

            display: none;

            text-align: center;

            margin-top: 15px;

            font-weight: bold;

            color: #003366;

        }
    </style>

</head>

<body>

    <div class="login-box">

        <div class="logo">🚔</div>

        <h2>UP Police Admin Login</h2>

        <input type="email" id="email" placeholder="Admin Email">

        <input type="password" id="password" placeholder="Password">

        <button id="loginBtn">

            LOGIN

        </button>

        <div class="loader" id="loader">

            Please Wait...

        </div>

        <p id="error"></p>

    </div>

    <script type="module" src="login.js"></script>

</body>

</html>
