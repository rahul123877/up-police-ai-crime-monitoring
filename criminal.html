<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criminal Database</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="report-container">

        <h1>Criminal Face Database</h1>

        <form id="criminalForm">

            <input type="text" id="criminalName" placeholder="Criminal Name" required>

            <input type="text" id="criminalCrime" placeholder="Crime Type" required>

            <input type="file" id="criminalImage" required>

            <button class="btn" type="submit">
                Upload
            </button>

        </form>

    </div>

</body>

</html>
