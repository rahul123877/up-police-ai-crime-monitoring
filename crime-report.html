<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Crime Report System</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div class="report-container">

        <h1>🚔 AI Crime Report Form</h1>

        <form id="crimeForm">

            <!-- COMPLAINANT -->
            <h2>Complainant Details</h2>

            <input type="text" id="fullname" placeholder="Full Name" required>
            <input type="text" id="fathername" placeholder="Father / Husband Name">

            <div class="row">
                <input type="number" id="age" placeholder="Age">
                <select id="gender">
                    <option value="">Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>

            <input type="tel" id="mobile" placeholder="Mobile Number" required>
            <input type="email" id="email" placeholder="Email Address">
            <input type="text" id="aadhaar" placeholder="Aadhaar Number">
            <textarea id="address" placeholder="Complete Address"></textarea>

            <hr>

            <!-- CRIME -->
            <h2>Crime Details</h2>

            <select id="crimeType" required>
                <option value="">Select Crime Type</option>
                <option>Theft</option>
                <option>Robbery</option>
                <option>Murder</option>
                <option>Cyber Crime</option>
                <option>Fraud</option>
            </select>

            <div class="row">
                <input type="date" id="crimeDate">
                <input type="time" id="crimeTime">
            </div>

            <input type="text" id="crimeLocation" placeholder="Crime Location">
            <textarea id="description" placeholder="Incident Details" rows="5"></textarea>

            <hr>

            <!-- SUSPECT -->
            <h2>Suspect Details</h2>

            <input type="text" id="suspectName" placeholder="Suspect Name">
            <input type="text" id="suspectAddress" placeholder="Suspect Address">

            <hr>

            <!-- WITNESS -->
            <h2>Witness Details</h2>

            <input type="text" id="witnessName" placeholder="Witness Name">
            <input type="tel" id="witnessMobile" placeholder="Witness Mobile">

            <hr>

            <!-- EVIDENCE -->
            <h2>Evidence Upload</h2>

            <input type="file" id="crimeImage" accept="image/*">
            <input type="file" id="crimeVideo" accept="video/*">
            <input type="file" id="crimePdf" accept=".pdf">

            <hr>

            <!-- AI -->
            <h2>AI Analysis</h2>

            <select id="priority">
                <option>High</option>
                <option>Medium</option>
                <option>Low</option>
            </select>

            <select id="status">
                <option>Pending</option>
                <option>Under Investigation</option>
                <option>Solved</option>
            </select>

            <input type="text" id="officer" placeholder="Officer Name">

            <input type="text" id="firNo" placeholder="FIR Number" readonly>

            <textarea id="remarks" placeholder="Remarks"></textarea>

            <hr>

            <!-- GPS -->
            <h2>Location</h2>

            <div class="row">
                <input type="text" id="latitude" readonly placeholder="Latitude">
                <input type="text" id="longitude" readonly placeholder="Longitude">
            </div>

            <button type="button" class="btn" onclick="getLocation()">📍 Get Location</button>

            <hr>

            <!-- SUBMIT -->
            <button type="submit" class="btn">🚔 Submit Report</button>
            <button type="reset" class="btn">🔄 Reset</button>

        </form>

    </div>

    <!-- GPS SCRIPT -->
    <script>
        function getLocation() {
            navigator.geolocation.getCurrentPosition((pos) => {
                document.getElementById("latitude").value = pos.coords.latitude;
                document.getElementById("longitude").value = pos.coords.longitude;
            });
        }
    </script>

    <!-- SUBMIT SCRIPT -->
    <script>
        document.getElementById("crimeForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const firNo = "FIR-" + Date.now();
            document.getElementById("firNo").value = firNo;

            const data = {
                firNo,
                fullname: document.getElementById("fullname").value,
                mobile: document.getElementById("mobile").value,
                crimeType: document.getElementById("crimeType").value,
                description: document.getElementById("description").value,
                location: document.getElementById("crimeLocation").value,
                priority: document.getElementById("priority").value,
                status: document.getElementById("status").value,
                officer: document.getElementById("officer").value,
                latitude: document.getElementById("latitude").value,
                longitude: document.getElementById("longitude").value,
                time: new Date().toISOString()
            };

            // Firebase hook (from external file)
            import("./js/crime-report.js").then(async (module) => {
                await module.saveCrimeReport(data);
            });

            alert("🚔 Report Submitted Successfully: " + firNo);

            document.getElementById("crimeForm").reset();
        });
    </script>

    <script type="module" src="js/crime-report.js"></script>

</body>
<div class="success-popup" id="successPopup">
    <div class="success-box">
        <h2>🚔 Report Submitted</h2>
        <p id="firText">FIR Generated</p>
        <button onclick="closePopup()">OK</button>
    </div>
</div>
