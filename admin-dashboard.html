<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>UP Police Admin Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">


    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins, sans-serif;
        }


        body {

            background: #081225;
            color: white;

        }


        header {

            height: 70px;
            background: #001f4d;

            display: flex;
            align-items: center;
            justify-content: space-between;

            padding: 0 30px;

        }


        header h2 {

            color: #00d9ff;

        }


        .logout {

            background: red;
            border: none;
            padding: 12px 25px;
            color: white;
            border-radius: 8px;
            cursor: pointer;

        }



        .container {

            padding: 30px;

            display: grid;

            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

            gap: 25px;

        }



        .card {

            background: #131b2f;

            padding: 30px;

            border-radius: 15px;

            box-shadow: 0 10px 25px rgba(0, 0, 0, .3);

        }



        .card h3 {

            color: #aaa;

        }



        .number {

            font-size: 40px;

            color: #00d9ff;

            margin-top: 10px;

        }


        .section {

            margin-top: 30px;

            background: #131b2f;

            padding: 25px;

            border-radius: 15px;

        }
    </style>

</head>


<body>


    <header>


        <h2>
            🚔 UP Police AI Admin Panel
        </h2>


        <button class="logout" id="logoutBtn">

            Logout

        </button>


    </header>



    <div class="container">


        <div class="card">

            <h3>Total Complaints</h3>

            <div class="number" id="complaintCount">
                0
            </div>

        </div>



        <div class="card">

            <h3>SOS Alerts</h3>

            <div class="number" id="sosCount">
                0
            </div>

        </div>




        <div class="card">

            <h3>Live Locations</h3>

            <div class="number" id="locationCount">
                0
            </div>

        </div>



        <div class="card">

            <h3>Police Users</h3>

            <div class="number" id="userCount">
                0
            </div>

        </div>


    </div>




    <div class="section">

        <div class="section">

            <h2>
                🚨 Live SOS Alerts
            </h2>


            <table>

                <thead>

                    <tr>

                        <th>User</th>
                        <th>Mobile</th>
                        <th>Message</th>
                        <th>Location</th>
                        <th>Time</th>

                    </tr>

                </thead>


                <tbody id="sosTable">

                </tbody>


            </table>


        </div>
        <h2>
            Live Crime Monitoring
        </h2>


        <p>
            Real time complaints, SOS alerts and location tracking will appear here.
        </p>


    </div>




    <script type="module" src="admin.js"></script>


</body>

</html>
