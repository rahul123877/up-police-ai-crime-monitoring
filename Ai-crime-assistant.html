<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UP Police AI Assistant</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b1220;
            color: #fff;
        }

        .sidebar {
            width: 240px;
            background: #13233d;
            position: fixed;
            top: 0;
            bottom: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .sidebar h2 {
            color: #00d4ff;
            margin-bottom: 30px;
        }

        .sidebar p {
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .sidebar p:hover {
            background: #1c355e;
        }

        .main {
            margin-left: 240px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: #10203a;
            padding: 15px;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 1px solid #1c355e;
        }

        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .msg {
            padding: 12px 16px;
            border-radius: 10px;
            margin: 8px 0;
            max-width: 70%;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .bot {
            background: #233b63;
            align-self: flex-start;
        }

        .user {
            background: #00d4ff;
            color: #000;
            align-self: flex-end;
        }

        .input-area {
            display: flex;
            padding: 15px;
            background: #10203a;
            border-top: 1px solid #1c355e;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            background: #13233d;
            border: 1px solid #233b63;
            color: white;
            border-radius: 5px;
            font-size: 16px;
        }

        input:focus {
            outline: 1px solid #00d4ff;
        }

        button {
            padding: 12px 24px;
            background: #00d4ff;
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #00b4d8;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2>UP Police AI</h2>
        <p>Dashboard</p>
        <p>Crime Map</p>
        <p>Prediction</p>
        <p>FIR Generator</p>
    </div>
    <div class="main">
        <div class="header">🤖 AI Crime Assistant</div>
        <div id="chat" class="chat">
            <div class="msg bot">Hello Officer! Ask me anything.</div>
        </div>
        <div class="input-area">
            <input id="msg" placeholder="Type your message..." autocomplete="off">
            <button onclick="send()">Send</button>
        </div>
    </div>

    <script>
        // CRITICAL: Apni sahi Gemini API Key yahan dalein (Ye "AIzaSy" se shuru hoti hai)
        const API_KEY = "YAHAN_APNI_GEMINI_API_KEY_DALEIN";

        async function send() {
            const inp = document.getElementById('msg');
            const t = inp.value.trim();
            if (!t) return;

            const chat = document.getElementById('chat');

            // User message screen par dikhayein
            chat.innerHTML += `<div class="msg user">${t}</div>`;
            inp.value = "";
            chat.scrollTop = chat.scrollHeight;

            // Loading state dikhane ke liye
            const loadingId = "load-" + Date.now();
            chat.innerHTML += `<div id="${loadingId}" class="msg bot">Thinking...</div>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                // Gemini API Call (Sahi endpoint aur structure ke sath)
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: t }] }] })
                });

                const d = await r.json();

                // Loading message ko hatao
                document.getElementById(loadingId).remove();

                // Response read karo
                let ans = d.candidates?.[0]?.content?.parts?.[0]?.text || "No response received.";

                // Agar API error deti hai
                if (d.error) {
                    ans = `API Error: ${d.error.message}`;
                }

                // AI response screen par dikhao
                chat.innerHTML += `<div class="msg bot">${ans.replace(/\n/g, '<br>')}</div>`;

            } catch (e) {
                document.getElementById(loadingId).remove();
                chat.innerHTML += `<div class="msg bot">Error: Network connection failed.</div>`;
            }

            chat.scrollTop = chat.scrollHeight;
        }

        // Enter key press par message send karne ke liye
        document.getElementById("msg").addEventListener("keydown", e => {
            if (e.key === "Enter") send();
        });
    </script>
</body>

</html>
