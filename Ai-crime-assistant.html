<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Crime Assistant</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <div class="container">

        <header>
            <h1>AI Crime Assistant</h1>

            <a href="dashboard.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i> Back
            </a>
        </header>

        <section class="chat-container">

            <div class="chat-box">

                <div class="bot-message">
                    <p>Hello! How can I help you today?</p>
                </div>

                <div class="user-message">
                    <p>Show nearby police stations.</p>
                </div>

                <div class="bot-message">
                    <p>Nearest police station: Hazratganj Police Station.</p>
                </div>

                <div class="user-message">
                    <p>Emergency help needed.</p>
                </div>

                <div class="bot-message">
                    <p>Dial 112 immediately. Live alert sent.</p>
                </div>

            </div>

            <div class="chat-input">

                <input type="text" placeholder="Type your message...">

                <button>
                    <i class="fa-solid fa-paper-plane"></i>
                </button>

            </div>

        </section>

    </div>

</body>

</html>
