<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Crime Prediction | UP Police</title>

    <link rel="stylesheet" href="styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>


<body>


    <div class="bg-animation">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>



    <header class="prediction-header">


        <div class="logo-box">


            <img src="images/up-police-logo.png" alt="UP Police">


            <div>

                <h1>
                    AI Crime Prediction System
                </h1>

                <p>
                    Uttar Pradesh Police | Artificial Intelligence Dashboard
                </p>


            </div>


        </div>



        <a href="dashboard.html" class="back-btn">

            <i class="fa-solid fa-arrow-left"></i>
            Dashboard

        </a>


    </header>





    <section class="prediction-section">



        <div class="prediction-form">


            <h2>

                <i class="fa-solid fa-brain"></i>

                AI Prediction Input

            </h2>





            <div class="input-group">

                <label>

                    <i class="fa-solid fa-location-dot"></i>

                    Select District

                </label>


                <select id="district">


                    <option value="">
                        Choose District
                    </option>

                    <option>Lucknow</option>
                    <option>Kanpur Nagar</option>
                    <option>Noida</option>
                    <option>Ghaziabad</option>
                    <option>Agra</option>
                    <option>Meerut</option>
                    <option>Prayagraj</option>
                    <option>Varanasi</option>
                    <option>Bareilly</option>
                    <option>Gorakhpur</option>
                    <option>Ayodhya</option>
                    <option>Jhansi</option>
                    <option>Aligarh</option>
                    <option>Moradabad</option>
                    <option>Saharanpur</option>


                </select>


            </div>





            <div class="input-group">


                <label>

                    <i class="fa-solid fa-shield-halved"></i>

                    Crime Type

                </label>



                <select id="crime">


                    <option value="">
                        Select Crime
                    </option>


                    <option>Theft</option>
                    <option>Vehicle Theft</option>
                    <option>Cyber Crime</option>
                    <option>Robbery</option>
                    <option>Murder</option>
                    <option>Kidnapping</option>
                    <option>Fraud</option>
                    <option>Chain Snatching</option>
                    <option>Assault</option>
                    <option>Drug Crime</option>


                </select>



            </div>






            <div class="input-group">


                <label>

                    <i class="fa-solid fa-calendar-days"></i>

                    Prediction Date

                </label>


                <input type="date" id="crimeDate">


            </div>





            <div class="input-group">


                <label>

                    <i class="fa-solid fa-clock"></i>

                    Time Slot

                </label>


                <select id="time">


                    <option>
                        Morning (6 AM - 12 PM)
                    </option>


                    <option>
                        Afternoon (12 PM - 4 PM)
                    </option>


                    <option>
                        Evening (4 PM - 8 PM)
                    </option>


                    <option>
                        Night (8 PM - 6 AM)
                    </option>


                </select>


            </div>





            <div class="input-group">


                <label>

                    <i class="fa-solid fa-cloud-sun"></i>

                    Weather

                </label>



                <select id="weather">


                    <option>Sunny</option>
                    <option>Cloudy</option>
                    <option>Rainy</option>
                    <option>Fog</option>


                </select>


            </div>






            <button class="predict-btn" onclick="predictCrime()">


                <i class="fa-solid fa-microchip"></i>

                Predict Crime Risk


            </button>




        </div>
