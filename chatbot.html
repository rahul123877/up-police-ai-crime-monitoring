<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <section class="chatbot">

        <h1>🤖 AI Crime Assistant</h1>

        <div class="chat-box">

            <div class="message ai">
                👮 Hello Officer! How can I help you today?
            </div>

            <div class="message user">
                Show today's crime report.
            </div>

            <div class="message ai">
                📊 Today: 23 Crimes Reported
                🚨 High Risk Area: Hazratganj
                🚔 Active Patrol Teams: 12
            </div>

        </div>

        <div class="chat-input">

            <input type="text" placeholder="Ask AI anything...">

            <button class="btn">
                <i class="fa-solid fa-paper-plane"></i> Send
            </button>

        </div>

    </section>
    <script src="app.js"></script>
</body>

</html>
<div class="chat-box" id="chatBox"></div>

<div class="chat-input">
    <input type="text" id="userInput">
    <button onclick="sendMessage()" class="btn">
        Send
    </button>
</div>
