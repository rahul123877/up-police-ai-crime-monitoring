<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <section class="admin">

        <h1>⚙️ Admin Control Panel</h1>

        <div class="admin-grid">

            <div class="admin-card">
                <i class="fa-solid fa-users"></i>
                <h2>Manage Users</h2>
                <p>Add, Edit & Delete Users</p>
                <a href="users.html" class="btn">Open</a>
            </div>

            <div class="admin-card">
                <i class="fa-solid fa-user-shield"></i>
                <h2>Police Officers</h2>
                <p>Manage Police Staff</p>
                <a href="officers.html" class="btn">Open</a>
            </div>

            <div class="admin-card">
                <i class="fa-solid fa-file-circle-plus"></i>
                <h2>Manage FIR</h2>
                <p>View All FIR Records</p>
                <a href="admin-fir.html" class="btn">Open</a>
            </div>

            <div class="admin-card">
                <i class="fa-solid fa-chart-line"></i>
                <h2>Analytics</h2>
                <p>Crime Statistics</p>
                <a href="dashboard.html" class="btn">Open</a>
            </div>

            <div class="admin-card">
                <i class="fa-solid fa-map-location-dot"></i>
                <h2>Crime Map</h2>
                <p>View Crime Hotspots</p>
                <a href="crime-map.html" class="btn">Open</a>
            </div>

            <div class="admin-card">
                <i class="fa-solid fa-gear"></i>
                <h2>Settings</h2>
                <p>System Configuration</p>
                <a href="settings.html" class="btn">Open</a>
            </div>

        </div>

    </section>

    <script src="app.js"></script>

</body>

</html>
