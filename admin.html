<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Crime Monitoring - Admin Panel</title>

    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="sidebar">

        <h2>🚔 AI Crime</h2>

        <ul>

            <li><a href="#"><i class="fa fa-home"></i> Dashboard</a></li>

            <li><a href="admin-fir.html"><i class="fa fa-file"></i> FIR Management</a></li>

            <li><a href="crime-map.html"><i class="fa fa-map"></i> Crime Map</a></li>

            <li><a href="officers.html"><i class="fa fa-user-shield"></i> Officers</a></li>

            <li><a href="criminals.html"><i class="fa fa-user-secret"></i> Criminals</a></li>

            <li><a href="analytics.html"><i class="fa fa-chart-line"></i> Analytics</a></li>

            <li><a href="settings.html"><i class="fa fa-gear"></i> Settings</a></li>

            <li><button id="logoutBtn">
                    <i class="fa fa-right-from-bracket"></i>
                    Logout
                </button></li>

        </ul>

    </div>

    <div class="main">

        <header>

            <h1>Admin Dashboard</h1>

            <div class="admin-info">

                <span id="adminName">Admin</span>

                <img src="https://i.pravatar.cc/45">

            </div>

        </header>

        <section class="cards">

            <div class="card">
                <h2 id="totalFir">0</h2>
                <p>Total FIR</p>
            </div>

            <div class="card">
                <h2 id="totalOfficer">0</h2>
                <p>Police Officers</p>
            </div>

            <div class="card">
                <h2 id="totalCriminal">0</h2>
                <p>Wanted Criminals</p>
            </div>

            <div class="card">
                <h2 id="cameraCount">325</h2>
                <p>Active Cameras</p>
            </div>

        </section>

        <section class="chart-box">

            <canvas id="crimeChart"></canvas>

        </section>

        <section class="table-box">

            <h2>Recent FIR Reports</h2>

            <table>

                <thead>

                    <tr>

                        <th>ID</th>

                        <th>Name</th>

                        <th>Crime</th>

                        <th>Location</th>

                        <th>Status</th>

                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="firTable">

                </tbody>

            </table>

        </section>

        <section class="quick">

            <button id="addFir">
                <i class="fa fa-plus"></i>
                Add FIR
            </button>

            <button id="addOfficer">
                <i class="fa fa-user-plus"></i>
                Add Officer
            </button>

            <button id="addCriminal">
                <i class="fa fa-user-secret"></i>
                Add Criminal
            </button>

        </section>

    </div>

    <script type="module" src="admin.js"></script>

</body>
