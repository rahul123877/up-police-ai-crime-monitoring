<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIR Management</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div class="container">

        <header>

            <h1>
                <i class="fa-solid fa-folder-open"></i>
                FIR Management System
            </h1>

            <a href="admin.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
                Back
            </a>

        </header>

        <!-- FIR FORM -->
        <section class="fir-form">

            <h2>Register New FIR</h2>

            <form id="firForm">

                <input type="text" id="name" placeholder="Full Name" required>

                <input type="text" id="mobile" placeholder="Mobile Number" required>

                <select id="crime" required>
                    <option value="">Select Crime Type</option>
                    <option>Theft</option>
                    <option>Robbery</option>
                    <option>Cyber Crime</option>
                    <option>Fraud</option>
                    <option>Assault</option>
                </select>

                <textarea id="details" placeholder="Incident Details" rows="5"></textarea>

                <input type="text" id="location" placeholder="Location">

                <button type="submit" class="btn">Submit FIR</button>

            </form>

        </section>

        <!-- STATUS -->
        <section class="fir-status">

            <h2>FIR Status</h2>

            <div class="status-card">Live updates will appear here</div>

        </section>

        <!-- TABLE -->
        <section class="record-section">

            <h2>Recent FIR Records</h2>

            <table>

                <thead>
                    <tr>
                        <th>FIR ID</th>
                        <th>Name</th>
                        <th>Crime</th>
                        <th>Location</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody id="firTable"></tbody>

            </table>

        </section>

    </div>

    <script type="module" src="fir.js"></script>

</body>

</html>
